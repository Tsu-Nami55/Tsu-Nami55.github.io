<!DOCTYPE><html>
<head>
    <title>JavaScript V</title>

	<!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.1.2/handlebars.min.js"></script>
    <script type="text/x-handlebars-template" id="tableTemplate">
        <table cellspacing='12'>
            <tr><th>Name</th><th>Major</th><th>Midterm</th><th>Final</th></tr>
            {{#each rows}}
                <tr>
                    <td>{{name}}</td><td>{{major}}</td><td>{{midterm}}</td><td>{{final}}</td>
                </tr>
            {{/each}}
        </table>
    </script>
	
	<!-- Styling -->
    <style>
		body{font-family: verdana;}
		p{color: #250030;}
		.paddingTop{padding-top: 85px;}
		.paddingBottom{padding-bottom: 100px;}
		header{
			font-family: verdana;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			background: linear-gradient(to right, #00d181, cyan);
			color: white;
			border-bottom-style: solid;
			border-bottom-color: lightgray;
			border-bottom-width: 5px;
		}
		.h1Header{
			font-family: verdana;
			padding-left: 20px;
		}
		.pHeader{
			border-bottom-style: solid;
			border-bottom-color: white;
			border-bottom-width: 3px;
		}
		footer{
			position: fixed;
			bottom: 0;
			right: 0;
			width: 100%;
			background: black;
		}
		.pFooter{
			font-family: verdana;
			font-size: 16px;
			padding-left: 10px;
			color: lightgray;
			padding-top: 5px;
			padding-bottom: 5px;
		}
		button{
			font-weight: bold;
			border-style: outset;
			border-color: #00d181;
			border-width: 4px;
			border-radius: 2.5px;
			background-color: #00d181;
			color: white;
			cursor: pointer;
		}
		button:active{
			border-style: inset;
			background-color: #02a869;
			color: whitesmoke;
		}
</style>
</head>
  
<body>
    <!-- Header -->
	<header>
		<h1 class="h1Header">Document Object Model</h1>
		<p class="pHeader"></p>
    </header>

    <!-- Padding -->
	<p class="paddingTop"></p>
    
    <h1>Select a Major</h1>

    <div>
      <button type="button" id="citMjrButton">CIT Majors</button>
      <button type="button" id="busMjrButton">Business Majors</button>
   </div>
    
     <h3>Filter students by major</h3>
  
    <div id="mjrTable" style="padding-left: 15px;"></div>

<script>
    window.onload = async function() {
        var buttonID;
        document.getElementById("citMjrButton").onclick = function() {
            buttonID = "CIT";
            getData(buttonID);
        }
        document.getElementById("busMjrButton").onclick = function() {
            buttonID = "BUS";
            getData(buttonID);
        }
    }

    async function getData(ID) {
        var url = "cit5students.json";
        var response = await fetch(url);
        if (response.ok) {
      
            var data = await response.json();

            if (ID == "CIT") {
                var filter = data.filter((data) => data.major == "CIT");
            }
            else if (ID == "BUS") {
                var filter = data.filter((data) => data.major == "BUS");
            }
            
            var tblTemp = document.getElementById("tableTemplate").innerHTML;
            var compTblTemp = Handlebars.compile(tblTemp);
            compHtml = compTblTemp({rows: filter})
            document.getElementById('mjrTable').innerHTML = compHtml;
        }
        else {
          document.querySelector('#mjrTable').innerHTML = "Data not found.";
        }
    }
</script>
	
	<!-- Padding -->
	<p class="paddingBottom"></p>
	
    <!-- Footer -->
	<footer><p class="pFooter">CIT 140: JavaScript I - Program V</p></footer>
        
</body>
</html>
